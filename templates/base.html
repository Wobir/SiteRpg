<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>{% block title %}{% endblock %} </title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light text-dark">
                <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-3">
                        <div class="container-fluid">
                                <a class="navbar-brand" href="{{ url_for('index') }}">SiteRpg</a>
                                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNavbar" aria-controls="siteNavbar" aria-expanded="false" aria-label="Toggle navigation">
                                        <span class="navbar-toggler-icon"></span>
                                </button>

                                <div class="collapse navbar-collapse" id="siteNavbar">
                                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                                        <li class="nav-item"><a class="nav-link" href="{{url_for('inventory')}}">Инвентарь</a></li>
                                        <li class="nav-item"><a class="nav-link" href="{{url_for('shop')}}">Магазин</a></li>
                                        <li class="nav-item"><a class="nav-link" href="{{url_for('adventure')}}">Путешествие</a></li>
                                        <li class="nav-item"><a class="nav-link" href="{{url_for('adminpanel')}}">Админ</a></li>
                                    </ul>
                                    <ul class="navbar-nav">
                                        <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Выйти</a></li>
                                    </ul>
                                </div>
                        </div>
                </nav>

        <main class="container">
            {% block content %}{% endblock %}
        </main>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{{ url_for('static', filename='js/init.js') }}"></script>
</body>
</html>
